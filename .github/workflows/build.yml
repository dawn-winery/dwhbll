name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Install Dependencies
        run: |
          sudo apt install -y liburing-dev software-properties-common

      - name: Add Repository
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test

      - name: Install GCC 15
        run: |
          sudo apt install -y gcc-15 g++-15
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-15 100

      - name: Build
        run: |
          cmake -B build . -DCMAKE_BUILD_TYPE=Debug -DDWHBLL_TESTS=ON -G Ninja
          cmake --build build
